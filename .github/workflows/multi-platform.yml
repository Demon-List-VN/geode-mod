name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest
          
        - name: macOS
          os: macos-latest

        - name: Android32
          os: ubuntu-latest
          target: Android32

        - name: Android64
          os: ubuntu-latest
          target: Android64

        - name: iOS
          os: macos-latest
          target: iOS

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}
          build-args: '--parallel 16'
      
  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: ['build']

    steps:
      - uses: actions/checkout@v4

      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - name: Resolve packaged mod file
        id: asset
        shell: bash
        run: |
          build_output='${{ steps.build.outputs.build-output }}'

          if [ -f "$build_output" ]; then
            asset_path="$build_output"
          else
            mapfile -t geode_files < <(find "$build_output" -type f -name '*.geode' | sort)

            if [ "${#geode_files[@]}" -eq 0 ]; then
              echo "No .geode file found in $build_output" >&2
              exit 1
            fi

            if [ "${#geode_files[@]}" -gt 1 ]; then
              printf 'Expected exactly one .geode file in %s, found:\n' "$build_output" >&2
              printf ' - %s\n' "${geode_files[@]}" >&2
              exit 1
            fi

            asset_path="${geode_files[0]}"
          fi

          echo "path=$asset_path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$asset_path")" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.asset.outputs.path }}

      - name: Resolve merged PR metadata
        if: github.ref == 'refs/heads/main'
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prs = await github.paginate(
              github.rest.repos.listPullRequestsAssociatedWithCommit,
              {
                owner,
                repo,
                commit_sha: context.sha,
              },
            );

            const mergedPr =
              prs.find((pr) => pr.merged_at && pr.base.ref === 'main') ??
              prs.find((pr) => pr.merged_at) ??
              null;

            if (!mergedPr) {
              core.warning(`No merged pull request associated with ${context.sha}; skipping release creation.`);
              core.setOutput('notes', context.payload.head_commit?.message?.split('\n')[0] ?? '');
              core.setOutput('title', '');
              core.setOutput('tag', '');
              core.setOutput('number', '');
              return;
            }

            const releaseVersion = mergedPr.head.ref.split('/').pop();
            const releaseNotes =
              mergedPr?.title ??
              context.payload.head_commit?.message?.split('\n')[0] ??
              `Release ${context.sha.slice(0, 7)}`;

            core.setOutput('title', releaseVersion);
            core.setOutput('tag', releaseVersion);
            core.setOutput('notes', releaseNotes);
            core.setOutput('number', String(mergedPr.number));

      - name: Create GitHub release
        if: github.ref == 'refs/heads/main' && steps.pr.outputs.tag != ''
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: ${{ steps.asset.outputs.path }}
          body: ${{ steps.pr.outputs.notes }}
          commit: ${{ github.sha }}
          makeLatest: true
          name: ${{ steps.pr.outputs.title }}
          replacesArtifacts: true
          tag: ${{ steps.pr.outputs.tag }}
